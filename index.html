<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>花畑の朝</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background-color: #f5f5f5;
    }

    .page {
      max-width: 960px;
      margin: 40px auto;
      padding: 20px;
      background: #ffffff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border-radius: 12px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
    }

    .hero > img {
      width: 100%;
      display: block;
    }

    .hero-text {
      position: absolute;
      top: 0;
      left: 0;
      background: rgba(0, 0, 0, 0.45);
      padding: 16px 20px;
      border-radius: 10px;
      font-size: 20px;
      line-height: 1.6;
      color: #ffffff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }

    .butterfly {
      position: absolute;
      top: 360px;
      left: 120px;
      width: 50px;
      max-width: 100px;
      height: auto;
    }

    .butterfly2 {
      position: absolute;
      top: 400px;
      left: 300px;
      width: 50px;
      max-width: 100px;
      height: auto;
    }

    .butterfly3 {
      position: absolute;
      top: 350px;
      left: 520px;
      width: 50px;
      max-width: 100px;
      height: auto;
    }

    .hero-text h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }

    .hero-text p {
      margin: 0;
      font-size: 16px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">

 
      <img src="bg0.png" >

      <div class="hero-text">
        <h1>ぽかぽか陽気の穏やかな朝</h1>
        <p>花畑では、蝶々がのんびり飛んでいます</p>
      </div>

      <img src="butterfly.gif" class="butterfly">
      <img src="butterfly.gif" class="butterfly2">
      <img src="butterfly.gif" class="butterfly3">

    </div>
  </div>
</body>
</html>
